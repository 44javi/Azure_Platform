# Databricks Account Network Policy — Egress Rules
# -------------------------------------------------------
# Managed by the security / network team.
# Changes here are picked up on the next terraform apply.
#
# egress_destinations : FQDNs reachable from serverless workloads
# storage_destinations: Azure Storage accounts reachable from serverless workloads
#   storage_service options: blob | dfs | file | queue | table
# -------------------------------------------------------

dev:
  workspace_ids:
    - 83827328791987132987132 # dbx-dataplatform-prod

  egress_destinations:
    - pypi.org
    - files.pythonhosted.org

  storage_destinations:
    - storage_account: dataplatformdev
      storage_service: dfs
    - storage_account: dataplatformdev
      storage_service: blob

