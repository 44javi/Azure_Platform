# Databricks Account Network Policy — Egress Rules
# -------------------------------------------------------
# Changes here are picked up on the next terraform apply.
#
# egress_destinations : FQDNs reachable from serverless workloads
# storage_destinations: Azure Storage accounts reachable from serverless workloads
#   storage_service options: blob | dfs | file | queue | table
# -------------------------------------------------------

dev:
  restriction_mode: RESTRICTED_ACCESS
  enforcement_mode: DRY_RUN
  workspace_ids:
    - 89428948297987248794289789741 # workspace name

  egress_destinations:
    - pypi.org
    - files.pythonhosted.org

  storage_destinations: []

qa:
  restriction_mode: RESTRICTED_ACCESS
  enforcement_mode: DRY_RUN
  workspace_ids:
    - 798328794290707182 # workspace name

  egress_destinations:
    - pypi.org
    - files.pythonhosted.org

  storage_destinations:
    - storage_account: # name
      storage_service: dfs
    - storage_account: # name
      storage_service: blob

prod:
  restriction_mode: RESTRICTED_ACCESS
  enforcement_mode: ENFORCED
  workspace_ids:
    - 89029802398042342 # workspace name

  egress_destinations:
    - pypi.org
    - files.pythonhosted.org
    - gitlab.com

  storage_destinations:
    - storage_account: stprod8932417892387  # name
      storage_service: dfs
    - storage_account: # name
      storage_service: blob
